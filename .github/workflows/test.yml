name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published, created]  # Run tests when releases are created or published

jobs:
  test:
    strategy:
      matrix:
        os: [windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Build package
        run: uv build

      - name: Install package
        run: uv pip install (Get-ChildItem dist -Filter *.whl | Select-Object -First 1 -ExpandProperty FullName)

      - name: Run tests
        run: uv run pytest tests/ -v
        # Tests will be automatically skipped on non-Windows or when DLL is not available
        # Skipped tests are considered successful, so no continue-on-error needed

  lint:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Check code formatting with black
        run: uv run black --check .

      - name: Check import sorting with isort
        run: uv run isort --check .

      - name: Lint with ruff
        run: uv run ruff check .

      - name: Type check with mypy
        run: uv run mypy Expedition/ || true  # Allow mypy to fail for now
