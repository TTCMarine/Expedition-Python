name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published, created]  # Run tests when releases are created or published

jobs:
  test:
    strategy:
      matrix:
        os: [windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Build package
        run: uv build

      - name: Install package
        run: uv pip install (Get-ChildItem dist -Filter *.whl | Select-Object -First 1 -ExpandProperty FullName)

      - name: Run tests with coverage (primary report)
        if: matrix.python-version == '3.12'
        run: uv run pytest tests/ -v --cov=Expedition --cov-report=xml
        # Tests will be automatically skipped when DLL is not available.
        # This run also generates coverage.xml for Codecov upload.

      - name: Run tests
        if: matrix.python-version != '3.12'
        run: uv run pytest tests/ -v
        # Skipped tests are considered successful, so no continue-on-error needed.

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  lint:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Check code formatting with black
        run: uv run black --check .

      - name: Check import sorting with isort
        run: uv run isort --check .

      - name: Lint with ruff
        run: uv run ruff check .

      - name: Type check with mypy
        run: uv run mypy Expedition/
